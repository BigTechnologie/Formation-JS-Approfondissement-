<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélectionné et manimuler les éléments</title>
</head>
<body>
    <h1>Sélectionné et manimuler les éléments</h1>
    <form action="">
        <div class="form-line" id="first-line">
            <label for="username"> Usename : </label>
            <input type="text" name="username" id="username">
        </div>
        <div class="form-line">
            <label for="email"> Email : </label>
            <input type="email" name="email" id="email">
        </div>
        <div class="form-line">
            <label for="password"> Password : </label>
            <input type="password" name="password" id="password" autocomplete="on">
        </div>
    </form>

    <section id="html" class="section first-section">
        <h2>Cours HTML</h2>
        <article class="article">
            Le HyperText Markup Language, généralement abrégé <a href="">HTML</a> ou, dans sa dernière version, HTML5, est le langage 
            de balisage conçu pour écrire les pages web. Il s'agit d'un format ouvert très utilisé en informatique.
        </article>
    </section>

</body>
</html>
